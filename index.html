<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MMのグラバトグループのギルド戦力ランキングと、各ギルドに所属する個人戦力ランキングエントリープレイヤーのリストを手軽に閲覧できるツール">
  <link rel="icon" href="./favicon.ico" type="image/x-icon">
  <title>MM Group Guild Bp Ranking</title>
  <!-- <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Cache-Control" content="no-cache"> -->

  <!--Import Google Icon Font-->
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <!--Import materialize.css-->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" />
  <!--Import application css-->
  <link type="text/css" rel="stylesheet" href="css/style.css?v=1.03" />

  <meta property="og:title" content="MM Group Guild Bp Ranking" />
  <meta property="og:description" content="MMのグラバトグループのギルド戦力ランキングと、各ギルドに所属する個人戦力ランキングエントリープレイヤーのリストを手軽に閲覧できるツール" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://yassy0413.github.io/mm-tools/" />
  <meta property="og:image" content="https://yassy0413.github.io/mm-tools/ogp.png" />
</head>

<body style="background-color: #eee; color: #fff">

  <header class="header-title grey lighten-4 z-depth-2 center">
    <a class="btn-floating waves-effect waves-light header-home-button" href="./" aria-label="ホーム">
      <i class="material-icons">home</i>
    </a>
    <h1 class="header-heading">
      <span class="black-text" id="header-title-a">
        Group Guild Bp Ranking
      </span>
      <span class="black-text hidden" id="header-title-b">
        <b><span style="color: #f00;">戦闘力ランキング</span></b>にエントリーしているプレーヤーのリスト
      </span>
    </h1>
  </header>

  <section class="container grey lighten-4 z-depth-2 custom-toolbar" aria-label="検索条件">
    <div class="row center-align-vertical" id="main-tool-bar">
      <!-- Group Id -->
      <div class="col">
        <span class="black-text" id="group-label"></span>
      </div>

      <!-- Dropdown -->
      <div class="col">
        <ul id="dropdown-servers" class="dropdown-content"></ul>
        <a class="btn dropdown-trigger" href="#!" data-target="dropdown-servers" id="dropdownButton">
          jp<i class="material-icons right">arrow_drop_down</i>
        </a>
      </div>

      <!-- Input Field -->
      <div class="input-field col">
        <input id="number_input" type="number" class="validate" />
        <label class="blue-grey-text text-darken-3 number_input_label" for="number_input">ワールド番号を入力...</label>
      </div>

      <!-- Button -->
      <div class="col">
        <button class="btn waves-effect waves-light" type="submit" name="action" id="Submit">
          <i class="material-icons"></i>
        </button>
      </div>
    </div>
  </section>

  <main id="content-root">
    <section id="content-explain" class="container center z-depth-3" aria-label="使い方">
      <div id="explain" class="black-text">
        <span class="explain-red-text">ワールド番号</span>を入力して、
        <span class="explain-red-text">その右の更新ボタン</span>をおすと<br />
        対象のワールドが所属するグループのギルドが<br />
        戦力降順で４８個(16x3)表示されます。<br />
        <br />
        ギルドセルをタップすると、<br />
        <b><span class="explain-green-text">戦闘力ランキングにエントリー</span></b>している<br />
        <b><span class="explain-green-text">プレーヤーのリスト</span></b>が表示されます。<br />
      </div>
    </section>

    <section id="content-links" class="center" aria-labelledby="links-title">
      <div class="center black-text">
        <h2 id="links-title" class="section-title">LINKS</h2>
      </div>

      <div id="link_weapon">
        <a href="https://docs.google.com/spreadsheets/d/15bxBeoWfO4R1b1u5OlohpwCsZLmWEUOaXwrsT9h0eYg/edit?gid=1773042965#gid=1773042965"
          target="_blank">
          <img class="youtube-iframe z-depth-2" src="./images/link_weapon.png?v=1.1" alt="">
        </a>
      </div>

      <div id="link_bp_rank">
        <a href="https://docs.google.com/spreadsheets/d/15bxBeoWfO4R1b1u5OlohpwCsZLmWEUOaXwrsT9h0eYg/edit?gid=0#gid=0"
          target="_blank">
          <img class="youtube-iframe z-depth-2" src="./images/link_bp_rank.png?v=1.0" alt="">
        </a>
      </div>

      <div id="link_youtube_yassy">
        <iframe class="youtube-iframe z-depth-2"
          src="https://www.youtube.com/embed/videoseries?si=bxRKvKTPz6q_r5IE&amp;list=PLv9V6VF7SsQWPt5W-jEePL2g_WIIIMksq"
          title="YouTube video player" frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
        </iframe>
      </div>

      <div id="link_youtube_enjack">
        <iframe class="youtube-iframe z-depth-2" src="https://www.youtube.com/embed/9YlkizeB7fc?si=jb_wrCc0ZE1kCRM6"
          title="YouTube video player" frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
        </iframe>
      </div>

      <div id="link_youtube_rei">
        <iframe class="youtube-iframe z-depth-2" src="https://www.youtube.com/embed/P1Ee-6DAMRg?si=ETnWM-Qb4NxuFLxY"
          title="YouTube video player" frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
        </iframe>
      </div>
    </section>

    <section id="content-rankings" class="scroll-container" aria-label="ギルド戦力ランキング">
      <div class="container custom-content">
        <div class="row center-align-vertical">
          <ul id="ranking-cells-1" class="collection with-header ranking-cell z-depth-1">
            <li class="collection-header">
              <h5>グランドマスター級</h5>
            </li>
          </ul>

          <ul id="ranking-cells-2" class="collection with-header ranking-cell z-depth-1">
            <li class="collection-header">
              <h5>エキスパート級</h5>
            </li>
          </ul>

          <ul id="ranking-cells-3" class="collection with-header ranking-cell z-depth-1">
            <li class="collection-header">
              <h5>エリート級</h5>
            </li>
          </ul>
        </div>
      </div>
    </section>

    <section id="content-bplist" class="container custom-content-bp" aria-label="プレイヤー戦闘力ランキング">
      <ul id="bp-cells" class="collection with-header ranking-cell col s4 m4 z-depth-2">
        <li id="guild-name" class="collection-header">
          <h5>GuildName</h5>
        </li>
      </ul>
    </section>
  </main>

  <template id="ranking-cell">
    <li class="collection-item rankcell-root">
      <div class="rankcell-row">
        <div class="rankcell-rank"></div>
        <div class="rankcell-world"></div>
        <div class="rankcell-guildname"></div>
        <div class="rankcell-bp"></div>
      </div>
    </li>
  </template>

  <!--JavaScript at end of body for optimized loading-->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script type="module" src="modules/main.js?v=1.03"></script>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Z8CV5JWWLX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-Z8CV5JWWLX');

</body>

</html>
